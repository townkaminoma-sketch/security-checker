name: ci

on:
  push:
    branches:
      - main
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  test:
    uses: townkaminoma-sketch/shared-workflows/.github/workflows/ci-python.yml@main
    with:
      python-version: "3.11"
      uv-version: "0.10.9"
