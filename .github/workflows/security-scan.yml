name: security-scan

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: security-scan-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  scan:
    uses: townkaminoma-sketch/shared-workflows/.github/workflows/security-scan.yml@main
    with:
      target-dir: "src"
